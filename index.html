<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SerenityOS - Personal Operating System</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Welcome Screen -->
    <div class="welcome-container" id="welcomeContainer">
        <div class="welcome-screen">
            <!-- Header -->
            <header class="welcome-header">
                <div class="header-left">
                    <span class="brand-text">SERENITYOS</span>
                </div>
                <nav class="header-right">
                    <a href="#">Docs</a>
                    <a href="#" class="btn-header">Explore →</a>
                </nav>
            </header>

            <!-- Main Hero -->
            <div class="hero-section">
                <div class="hero-content">
                    <h1 class="hero-title">Your personal<br>operating system.</h1>
                    <p class="hero-subtitle">Fully functional.</p>
                    <p class="hero-description">Built with vanilla JavaScript, featuring draggable windows, real-time apps, and professional design.</p>

                    <form class="hero-form" id="nameForm">
                        <input type="text" id="nameInput" placeholder="Enter your name..." class="form-input">
                        <button type="submit" id="enterBtn" class="form-button">Enter OS →</button>
                    </form>
                </div>
            </div>

            <!-- Footer -->
            <footer class="page-footer">
                <div class="footer-left">
                    <span class="footer-brand">SERENITYOS</span>
                </div>
                <nav class="footer-right">
                    <a href="#">GitHub</a>
                    <a href="#">Docs</a>
                    <a href="#">Privacy</a>
                </nav>
            </footer>

            <div class="background-gradient"></div>
        </div>
    </div>

    <!-- OS Desktop -->
    <div class="os-desktop" id="osDesktop">
        <div class="desktop">
            <div class="topbar">
                <div class="topbar-left"><span class="system-name">SerenityOS</span></div>
                <div class="topbar-center"><span class="visitor-name" id="visitorDisplay">Welcome</span></div>
                <div class="topbar-right"><span class="time" id="systemTime">00:00</span></div>
            </div>
            <div class="desktop-content" id="desktopContent">
                <div class="taskbar">
                    <div class="taskbar-apps" id="taskbar">
                        <button class="app-icon" data-app="about" title="About" style="font-size: 24px; font-weight: bold;">i</button>
                        <button class="app-icon" data-app="projects" title="Projects" style="font-size: 20px;">📈</button>
                        <button class="app-icon" data-app="portfolio" title="Portfolio" style="font-size: 20px;">💼</button>
                        <button class="app-icon" data-app="contact" title="Contact" style="font-size: 20px;">✉</button>
                        <button class="app-icon" data-app="notes" title="Notes" style="font-size: 20px;">📝</button>
                        <button class="app-icon" data-app="todo" title="To-Do" style="font-size: 20px;">✓</button>
                        <button class="app-icon" data-app="calculator" title="Calculator" style="font-size: 20px;">+</button>
                        <button class="app-icon" data-app="timer" title="Timer" style="font-size: 20px;">⏱</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
